on:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        version: [11, 17]
        os: ["ubuntu", "windows", "macos"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.version }}
          cache: "maven"
          distribution: "temurin"
      - name: Build, test, coverage
        run: ./mvnw clean test jacoco:report
      - name: Coveralls parallel
        if: matrix.os != 'macos'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-empty: true
          flag-name: run-jvm-${{ join(matrix.*, '-') }}
          parallel: true
          base-path: src/main/java

  graalvm-native-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          components: native-image
          cache: maven
      - name: Compile smoke test
        run: ./mvnw -B -DskipTests test-compile dependency:build-classpath -Dmdep.outputFile=target/test-classpath.txt
      - name: Build native image
        run: |
          native-image --no-fallback --enable-url-protocols=http \
            -cp "target/classes:target/test-classes:$(cat target/test-classpath.txt)" \
            io.getunleash.repository.GraalVmHttpFeatureFetcherSmoke \
            target/graalvm-http-feature-fetcher-smoke
      - name: Run native image smoke test
        run: ./target/graalvm-http-feature-fetcher-smoke
  finish:
    needs: [build, graalvm-native-image]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
          carryforward: run-jvm-8,run-jvm-11,run-jvm-17
